services:
  bot:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - TELEGRAM_API_URL=http://telegram-bot-api:8081
    volumes:
      - ./data:/app/data
    depends_on:
      - telegram-bot-api

  telegram-bot-api:
    image: aiogram/telegram-bot-api:latest
    user: root
    environment:
      - TELEGRAM_API_ID=${TELEGRAM_API_ID}
      - TELEGRAM_API_HASH=${TELEGRAM_API_HASH}
      - TELEGRAM_STAT=1
    volumes:
      - ./tg-data:/var/lib/telegram-bot-api
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://127.0.0.1:8082/stats"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
